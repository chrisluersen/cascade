services:
  cascade:
    build: .
    ports:
      - "${PORT:-8319}:${PORT:-8319}"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      # python:3.12-slim ships without curl/wget — probe with the stdlib instead
      test: ["CMD", "python", "-c", "import os,urllib.request; urllib.request.urlopen(f\"http://localhost:{os.environ.get('PORT','8319')}/health\")"]